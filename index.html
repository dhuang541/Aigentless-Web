<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aigentless | Automated Leasing Platform</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            fancy: ['"Libre Baskerville"', 'serif'],
          },
          colors: {
            brand: {
              gray: '#666666',
              light: '#f5f5f5'
            }
          }
        },
      },
    };
  </script>
  
  <style>
    html {
      scroll-behavior: smooth;
      scroll-padding-top: 5.5rem;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    section[id] {
      scroll-margin-top: 5.5rem;
    }

    /* Liquid Glass CSS */
    .liquid-glass {
      background: rgba(0, 0, 0, 0.5);
      background-blend-mode: luminosity;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
    }
    
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.35) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Character Animation Base */
    .char {
      display: inline-block;
      opacity: 0;
      transform: translateX(-18px);
      transition: opacity 500ms ease-out, transform 500ms ease-out;
    }
    
    .char.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .glass-border {
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    /* Nav-matched CTA buttons */
    .nav-cta {
      font-size: 11px;
      font-weight: 600; /* This is the CSS equivalent of font-semibold */
      letter-spacing: -0.04em; /* This is the CSS equivalent of tracking-tighter */
      text-transform: uppercase;
      color: rgba(229, 231, 235, 0.95);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .nav-cta:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.18);
    }

    /* Unified translucent sections — continuous scroll */
    /* Unified translucent sections — continuous scroll */
.scroll-section {
  position: relative;
  z-index: 10;
}
/* Deleted .hero-to-content-blur entirely */

    /* Integration conveyor belt */
    @keyframes conveyor-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .integration-conveyor {
      overflow: hidden;
      width: 100%;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 6%, black 94%, transparent 100%);
    }

    .integration-conveyor-track {
      display: flex;
      gap: 1rem;
      width: max-content;
      animation: conveyor-scroll 45s linear infinite;
      will-change: transform;
    }

    .integration-conveyor:hover .integration-conveyor-track {
      animation-play-state: paused;
    }

    .integration-card {
      flex-shrink: 0;
      width: 11rem;
    }

    @media (min-width: 768px) {
      .integration-card { width: 12.5rem; }
    }

/* Hero rotating phrase — Mobile wrapping, Desktop single-line */
.rotating-phrase-window {
      display: block;
      width: 100%;
      overflow: hidden;
      position: relative;
      height: 2.5em; /* Slightly taller to safely hold two lines */
    }

    .phrase-layer {
      display: block;
      width: 100%;
      line-height: 1.2;
      white-space: normal;
      font-size: clamp(1.0rem, 4.0vw, 3.8rem); /* Reduced 6.5vw to 5.5vw to prevent cutoff */
      color: #fff;
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
    }

    /* Hide scrollbar for mobile feature tabs */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @media (min-width: 768px) {
      .rotating-phrase-window {
        height: 1.25em; /* Holds one line on desktop */
      }
      .phrase-layer {
        white-space: nowrap; /* Forces one line on desktop */
        font-size: min(3.8vw, 3.75rem); /* Caps the desktop text so it perfectly matches the static line */
      }
    }

    /* Helper to hide scrollbars on the mobile tabs */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .phrase-layer.is-exiting {
      transform: translateY(100%);
      opacity: 0;
    }

    .phrase-layer.is-entering {
      transform: translateY(-100%);
      opacity: 0;
    }

    .phrase-layer.is-active {
      transform: translateY(0);
      opacity: 1;
    }

    .cross-sell-line {
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 1;
      fill: none;
      transition: stroke-opacity 300ms ease, stroke 300ms ease;
    }

    .cross-sell-graphic:hover .cross-sell-line {
      stroke: rgba(255, 255, 255, 0.55);
      stroke-opacity: 1;
    }

    .feature-panel-fade {
      transition: opacity 300ms ease-out;
    }

    .iphone-shell {
      border-radius: 2.75rem;
      padding: 0.55rem;
      background: linear-gradient(145deg, #2a2a2a 0%, #0a0a0a 100%);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 24px 48px rgba(0, 0, 0, 0.45);
    }

    .iphone-screen {
      border-radius: 2.25rem;
      background: #000;
      overflow: hidden;
      position: relative;
    }

    .iphone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 26px;
      background: #000;
      border-radius: 0 0 1rem 1rem;
      z-index: 20;
    }

    .chat-bubble-enter {
      opacity: 0;
      transform: scale(0.95) translateY(8px);
      transition: opacity 450ms cubic-bezier(0.16, 1, 0.3, 1),
                  transform 450ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .chat-bubble-enter.is-visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    @keyframes typing-dot {
      0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    .typing-dot {
      animation: typing-dot 1s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ChatBubble = ({ role, children }) => {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const frame = requestAnimationFrame(() => setVisible(true));
        return () => cancelAnimationFrame(frame);
      }, []);

      const isUser = role === 'user';
      return (
        <div
          className={`chat-bubble-enter ${visible ? 'is-visible' : ''} ${
            isUser
              ? 'bg-white text-black p-4 rounded-2xl rounded-tr-none ml-auto max-w-[85%] shadow-md'
              : 'bg-white/5 p-4 rounded-2xl rounded-tl-none border border-white/5 max-w-[85%]'
          }`}
        >
          <p className={`text-xs leading-relaxed ${isUser ? 'font-medium' : 'text-gray-300'}`}>
            {children}
          </p>
        </div>
      );
    };

    const TypingIndicator = () => (
      <div className="chat-bubble-enter is-visible flex gap-1.5 items-center bg-white/5 border border-white/5 px-4 py-3.5 rounded-2xl rounded-tr-none ml-auto max-w-[85%] w-fit">
        <span className="typing-dot w-1.5 h-1.5 rounded-full bg-gray-400 block" />
        <span className="typing-dot w-1.5 h-1.5 rounded-full bg-gray-400 block" />
        <span className="typing-dot w-1.5 h-1.5 rounded-full bg-gray-400 block" />
      </div>
    );

    const ControlCenterChatSimulator = () => {
      const panelRef = useRef(null);
      const chatRef = useRef(null);
      const startedRef = useRef(false);
      const [hasStarted, setHasStarted] = useState(false);
      const [showAi1, setShowAi1] = useState(false);
      const [showTyping, setShowTyping] = useState(false);
      const [showUser, setShowUser] = useState(false);
      const [showAi2, setShowAi2] = useState(false);

      useEffect(() => {
        const node = panelRef.current;
        if (!node) return;
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting && !startedRef.current) {
              startedRef.current = true;
              setHasStarted(true);
            }
          },
          { threshold: 0.35, rootMargin: '0px 0px -8% 0px' }
        );
        observer.observe(node);
        return () => observer.disconnect();
      }, []);

      useEffect(() => {
        if (!hasStarted) return;
        const t1 = setTimeout(() => setShowAi1(true), 800);
        const t2 = setTimeout(() => setShowTyping(true), 2400);
        const t3 = setTimeout(() => {
          setShowTyping(false);
          setShowUser(true);
        }, 2800);
        const t4 = setTimeout(() => setShowAi2(true), 4800);
        return () => [t1, t2, t3, t4].forEach(clearTimeout);
      }, [hasStarted]);

      useEffect(() => {
        const el = chatRef.current;
        if (!el) return;
        el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
      }, [showAi1, showTyping, showUser, showAi2]);

      return (
        <div ref={panelRef} className="mx-auto w-full max-w-[300px] lg:max-w-[320px]">
          <div className="iphone-shell">
            <div className="iphone-screen flex flex-col min-h-[520px] max-h-[560px]">
              <div className="iphone-notch" aria-hidden="true" />
              <div className="flex items-center justify-between px-5 pt-10 pb-2 shrink-0">
                <span className="text-[10px] text-gray-400 font-medium">9:41</span>
                <span className="text-[9px] text-gray-400 tracking-widest uppercase font-semibold">Leasa AI</span>
                <span className="text-[10px] text-gray-500">●●●</span>
              </div>

              <div ref={chatRef} className="flex-1 space-y-3 overflow-y-auto px-3 pb-5 min-h-0 scroll-smooth">
                {showAi1 && (
                  <ChatBubble role="ai">
                    <>
                      Welcome to <strong className="text-white font-semibold">The Audley</strong>, Bella! Your self-guided exploration of Unit 102 is active. Let me know if you have questions about specific utilities or building dimensions.
                    </>
                  </ChatBubble>
                )}
                {showTyping && <TypingIndicator />}
                {showUser && (
                  <ChatBubble role="user">
                    Are there any alternative layouts or matching units available within this building portfolio?
                  </ChatBubble>
                )}
                {showAi2 && (
                  <ChatBubble role="ai">
                    Yes, Unit 112 is a 1,100 sq ft option featuring 2 bathrooms, available starting Dec 15. Would you like me to adjust your access schedule or unlock the application dashboard?
                  </ChatBubble>
                )}
              </div>

              <div className="shrink-0 h-1.5 mx-auto mb-2 w-28 rounded-full bg-white/20" aria-hidden="true" />
            </div>
          </div>
        </div>
      );
    };

    // --- Components ---

    const FadeIn = ({ children, delay = 0, duration = 1000, className = "" }) => {
      const [isVisible, setIsVisible] = useState(false);
      useEffect(() => {
        const timer = setTimeout(() => setIsVisible(true), delay);
        return () => clearTimeout(timer);
      }, [delay]);

      return (
        <div 
          className={`transition-all ${className}`}
          style={{ 
            opacity: isVisible ? 1 : 0, 
            transform: isVisible ? 'translateY(0)' : 'translateY(20px)',
            transitionDuration: `${duration}ms`,
            transitionTimingFunction: 'ease-out'
          }}
        >
          {children}
        </div>
      );
    };

    const HERO_TYPE = "font-semibold uppercase tracking-tighter text-3xl sm:text-4xl md:text-5xl lg:text-6xl leading-[1.2] text-white";
    const HERO_TRACKING = {}; 
    const HERO_SUBTITLE = "text-sm sm:text-base md:text-lg lg:text-xl font-semibold uppercase tracking-tighter text-gray-300 mt-3 md:mt-2";
    const HERO_TAGLINE = "text-lg md:text-xl font-normal text-gray-200 leading-snug";

    const ROTATING_PHRASES = [
      "actually close.",
      "automatically convert leads to leases.",
      "meet renters right where they are.",
    ];

    const RotatingPhrases = () => {
      const [index, setIndex] = useState(0);
      const [phase, setPhase] = useState('active'); // entering | active | exiting
      const indexRef = useRef(0);

      useEffect(() => {
        const cycle = () => {
          setPhase('exiting');
          setTimeout(() => {
            const next = (indexRef.current + 1) % ROTATING_PHRASES.length;
            indexRef.current = next;
            setIndex(next);
            setPhase('entering');
            setTimeout(() => setPhase('active'), 40);
          }, 500);
        };
        const timer = setInterval(cycle, 4000);
        return () => clearInterval(timer);
      }, []);

      const phaseClass =
        phase === 'exiting' ? 'is-exiting' : phase === 'entering' ? 'is-entering' : 'is-active';

      return (
        <span className={`rotating-phrase-window ${HERO_TYPE}`} style={HERO_TRACKING}>
          <span key={index} className={`phrase-layer ${phaseClass}`}>
            {ROTATING_PHRASES[index]}
          </span>
        </span>
      );
    };

    const CrossSellGraphic = () => {
      const [step, setStep] = useState(0);

      // Staggered animation for the options popping in
      useEffect(() => {
        let isMounted = true;
        const s1 = setTimeout(() => isMounted && setStep(1), 500);  // Inter-Portfolio pops
        const s2 = setTimeout(() => isMounted && setStep(2), 900);  // Up-Sell pops
        
        return () => {
          isMounted = false;
          clearTimeout(s1); clearTimeout(s2);
        };
      }, []);

      return (
        <div className="liquid-glass rounded-2xl p-5 md:p-6 min-h-[280px] flex flex-col items-center justify-center">
          <div className="relative z-10 flex flex-col items-center h-full w-full">
            
            {/* Primary Selection (Static) */}
            <div className="bg-white/10 rounded-xl px-4 py-3 text-center max-w-[280px] w-full shadow-lg border border-white/5">
              <div className="text-[9px] uppercase tracking-widest text-gray-400 mb-1">Primary Selection</div>
              <div className="text-xs text-white font-medium leading-snug">Unit 104 — Paper Box Lofts</div>
              <div className="text-[11px] text-gray-300 mt-0.5">$3,600/mo</div>
            </div>
            
            <div className="flex-1 min-h-[32px]" />
            
            {/* Animated Cross-Sell Options */}
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-[380px]">
              
              {/* Inter-Portfolio Card */}
              <div 
                className={`bg-white/[0.06] rounded-xl px-4 py-4 text-left cursor-pointer border border-transparent hover:border-white/20 hover:bg-white/[0.09] hover:scale-105 hover:shadow-xl transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) ${step >= 1 ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-4 scale-95'}`}
              >
                <div className="text-[8px] uppercase tracking-widest text-emerald-400/90 mb-1.5 font-semibold">Inter-Portfolio</div>
                <div className="text-[11px] text-white font-medium leading-tight mb-1">Unit 112 — The Audley</div>
                <div className="text-[10px] text-gray-400">$1,800/mo · Available Nov 15</div>
              </div>
              
              {/* Up-Sell Card */}
              <div 
                className={`bg-white/[0.06] rounded-xl px-4 py-4 text-left cursor-pointer border border-transparent hover:border-white/20 hover:bg-white/[0.09] hover:scale-105 hover:shadow-xl transition-all duration-500 cubic-bezier(0.34, 1.56, 0.64, 1) ${step >= 2 ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-4 scale-95'}`}
              >
                <div className="text-[8px] uppercase tracking-widest text-blue-400/90 mb-1.5 font-semibold">Up-Sell</div>
                <div className="text-[11px] text-white font-medium leading-tight mb-1">Unit 206 — The Maple</div>
                <div className="text-[10px] text-gray-400">Penthouse · Leasa Suggested</div>
              </div>

            </div>
          </div>
        </div>
      );
    };
    const DeploymentGraphic = () => {
      const [step, setStep] = useState(0);

      // Staggered animation: Wireframe -> Brand Name -> Properties fade in
      useEffect(() => {
        let isMounted = true;
        const s1 = setTimeout(() => isMounted && setStep(1), 600);  // "Fox River" fades in
        const s2 = setTimeout(() => isMounted && setStep(2), 1600); // "Your Brand Live" fades out
        const s3 = setTimeout(() => isMounted && setStep(3), 2000); // Properties list fades in
        
        return () => {
          isMounted = false;
          clearTimeout(s1); clearTimeout(s2); clearTimeout(s3);
        };
      }, []);

      const properties = [
        { addr: '1401 S State St', rent: '$2,400' },
        { addr: '850 N Lake Shore Dr', rent: '$3,100' },
        { addr: '200 E Illinois St', rent: '$2,850' },
      ];

      return (
        <div className="liquid-glass rounded-2xl p-5 h-full min-h-[240px] flex flex-col relative overflow-hidden">
          
          {/* Header Section */}
          <div className="flex gap-3 items-center mb-4 relative z-20">
            <div className="w-10 h-10 rounded-xl bg-white/15 shrink-0 flex items-center justify-center overflow-hidden border border-white/5">
               <span className={`text-[10px] font-bold tracking-widest text-white transition-opacity duration-700 ${step >= 1 ? 'opacity-100' : 'opacity-0'}`}>
                 FR
               </span>
            </div>
            
            <div className="flex-1 h-10 relative flex flex-col justify-center">
              {/* Initial Skeleton Bars */}
              <div className={`absolute inset-0 flex flex-col justify-center space-y-2 transition-all duration-500 ${step >= 1 ? 'opacity-0 -translate-y-2' : 'opacity-100 translate-y-0'}`}>
                <div className="h-2.5 w-[80%] max-w-[140px] rounded bg-white/20" />
                <div className="h-2 w-[60%] max-w-[100px] rounded bg-white/10" />
              </div>
              
              {/* Branded Text */}
              <div className={`absolute inset-0 flex flex-col justify-center transition-all duration-700 ${step >= 1 ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-3'}`}>
                <div className="text-[13px] text-white font-medium tracking-tight">Fox River Properties</div>
                <div className="text-[9px] text-emerald-400 uppercase tracking-widest mt-0.5 font-semibold">Live Portfolio</div>
              </div>
            </div>
          </div>

          {/* Content Cross-Fade Section */}
          <div className="flex-1 relative mt-1">
            
            {/* The "Your Brand Live" placeholder */}
            <div className={`absolute inset-0 rounded-xl bg-white/5 flex items-center justify-center transition-all duration-700 ${step >= 2 ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100'}`}>
              <span className="text-[10px] text-gray-400 uppercase tracking-[0.3em]">Your Brand · Live</span>
            </div>

            {/* The Branded Property List */}
            <div className={`absolute inset-0 flex flex-col justify-center gap-2.5 transition-all duration-700 ${step >= 3 ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}>
              {properties.map((prop, i) => (
                <div 
                  key={i} 
                  className={`flex justify-between items-center bg-white/[0.04] rounded-lg px-3.5 py-2.5 border border-white/5 transition-all duration-500 hover:bg-white/[0.08] cursor-pointer`}
                  style={{ transitionDelay: `${step >= 3 ? i * 150 : 0}ms` }}
                >
                  <span className="text-[11px] text-white font-medium">{prop.addr}</span>
                  <span className="text-[10px] text-gray-400 tracking-wide">{prop.rent}/mo</span>
                </div>
              ))}
            </div>

          </div>
        </div>
      );
    };
    const CommunicationGraphic = () => {
      const [step, setStep] = useState(0);

      useEffect(() => {
        let isMounted = true;
        // Stagger the appearance of the messages
        const s1 = setTimeout(() => isMounted && setStep(1), 600);
        const s2 = setTimeout(() => isMounted && setStep(2), 2200);
        const s3 = setTimeout(() => isMounted && setStep(3), 3200);
        const s4 = setTimeout(() => isMounted && setStep(4), 4800);
        
        return () => {
          isMounted = false;
          clearTimeout(s1); clearTimeout(s2); clearTimeout(s3); clearTimeout(s4);
        };
      }, []);

      return (
        <div className="liquid-glass rounded-2xl p-5 h-full min-h-[320px] flex flex-col relative overflow-hidden">
          {/* Header: Leasa AI Profile */}
          <div className="flex items-center gap-3 mb-4 pb-3 border-b border-white/10 shrink-0">
            <div className="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center shrink-0">
              <div className="w-4 h-4 rounded-full bg-white/20 relative">
                {/* Active Status Dot */}
                <div className="absolute -bottom-0.5 -right-0.5 w-2 h-2 rounded-full bg-emerald-500 border border-[#1a1a1a]"></div>
              </div>
            </div>
            <div>
              <div className="text-[11px] text-white font-semibold tracking-widest uppercase">Leasa AI</div>
            </div>
          </div>

          {/* Animated Chat Stream */}
          <div className="flex-1 flex flex-col justify-end overflow-hidden">
            <div className="space-y-3 w-full flex flex-col justify-end">
              {step >= 1 && (
                <ChatBubble role="ai">
                  Hi Bella! I noticed you just unlocked Unit 102. How does the layout look to you?
                </ChatBubble>
              )}
              {step >= 2 && (
                <ChatBubble role="user">
                  It's nice, but do you have anything available with a second bathroom?
                </ChatBubble>
              )}
              {step === 3 && <TypingIndicator />}

      const onTouchStart = (e) => {
        setTouchEnd(null);

      const onTouchEndHandler = () => {
        if (!touchStart || !touchEnd) return;
        const distance = touchStart - touchEnd;
        const isLeftSwipe = distance > minSwipeDistance;

        if (isLeftSwipe || isRightSwipe) {
          const currentIndex = FEATURE_TABS.findIndex(t => t.id === activeTab);
